<!DOCTYPE html>

              "inverse-on-surface": "#313030",
              "secondary-fixed-dim": "#e9c349",
              "surface-variant": "#353534",
              "surface-bright": "#3a3939",
              "on-primary-fixed-variant": "#930005",

              "surface": "#131313",

              "surface-container": "#201f1f",

              "on-error": "#690005",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body select-none overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-neutral-950/60 backdrop-blur-xl shadow-2xl shadow-black/50">
<div class="flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-neutral-500 hover:text-red-300 transition-colors duration-300 active:scale-95">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<span class="text-lg font-bold tracking-widest uppercase text-neutral-100 font-headline">GoPrompt</span>
</div>
<div class="flex items-center gap-4">
<button class="px-5 py-1.5 rounded-lg bg-primary-container text-on-primary-container font-headline font-bold text-sm tracking-tight active:scale-95 duration-200 transition-all shadow-lg shadow-primary-container/20">
                    SAVE
                </button>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant/30">
<img class="w-full h-full object-cover" data-alt="Profile avatar for the user" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLgIFlR_zdVuOB7svNABLdFavmz1-BFTGtE8Rbb-b_oTFUNSkqVb2LgD5KkudO0bfQTDKVK-W5LcPWMFQOHPxUUUv-oLReSpMrt8keZxCXgQELEI7fABgHNvrAoLUSKF2wNWxiijwjW68yDHZAC3f65OOg8vfc8JfXLTsdf4ypNm3wmnWLFvFGeYbChWR8TwfGYXKI5YxEspwmrS0gam_wbpWNDpRdloaTSnvqxihBE8bebJaI2IcOnxGQD7ag-FmSRenQdr1uRcde"/>
</div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative pt-16 pb-40 h-screen flex flex-col px-6 md:px-24 lg:px-48">
<!-- Script Metadata / Title -->
<div class="mt-8 mb-4">
<input class="w-full bg-transparent border-none focus:ring-0 font-headline font-extrabold text-3xl md:text-5xl tracking-tight text-primary uppercase placeholder-neutral-700" placeholder="UNTITLED SCRIPT" type="text" value="THE MIDNIGHT MONOLOGUE"/>
<div class="flex gap-4 mt-2 items-center text-on-surface-variant font-label text-xs uppercase tracking-widest opacity-60">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]" data-icon="timer">timer</span> 03:45 EST.</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]" data-icon="auto_stories">auto_stories</span> 428 WORDS</span>
</div>
</div>
<!-- The Obsidian Lens: Script Editor Area -->
<div class="flex-grow overflow-y-auto hide-scrollbar mt-4">
<textarea class="w-full h-full bg-transparent border-none focus:ring-0 text-on-surface font-headline font-semibold text-2xl md:text-4xl leading-relaxed resize-none placeholder-neutral-800" placeholder="Start writing your script here... Focus on the lens.">Deep in the heart of the city, where the neon flickers against the obsidian glass of the skyscrapers, there is a story that never gets told. 

It’s a story of the silent hours. Between the last train and the first light. 

[PAUSE - 2 SECONDS]

Look directly into the camera. Feel the weight of the silence. We are not just capturing images; we are capturing the soul of the machine.</textarea>
</div>
</main>
<!-- Formatting Toolbar (Contextual Bottom Overlay) -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] md:w-auto max-w-2xl z-40">
<div class="bg-surface-container-high/60 backdrop-blur-3xl rounded-xl border border-outline-variant/15 p-4 flex flex-wrap items-center justify-between gap-6 shadow-2xl">
<!-- Font Size -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary opacity-80" data-icon="format_size">format_size</span>
<div class="flex bg-surface-container-lowest rounded-lg p-1">
<button class="p-1 hover:text-primary transition-colors"><span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span></button>
<span class="px-3 font-label font-bold text-sm">48px</span>
<button class="p-1 hover:text-primary transition-colors"><span class="material-symbols-outlined text-[18px]" data-icon="add">add</span></button>
</div>
</div>
<!-- Line Spacing -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary opacity-80" data-icon="format_line_spacing">format_line_spacing</span>
<div class="flex gap-1">
<button class="w-8 h-8 rounded bg-surface-container-highest flex items-center justify-center text-xs font-bold text-primary border border-primary/20">1.0</button>
<button class="w-8 h-8 rounded bg-surface-container-lowest flex items-center justify-center text-xs font-bold hover:bg-neutral-800">1.5</button>
<button class="w-8 h-8 rounded bg-surface-container-lowest flex items-center justify-center text-xs font-bold hover:bg-neutral-800">2.0</button>
</div>
</div>
<!-- Speed Control -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary opacity-80" data-icon="speed">speed</span>
<input class="w-24 h-1 bg-surface-container-lowest rounded-full appearance-none accent-primary cursor-pointer" type="range"/>
<span class="font-label font-bold text-xs w-8">x1.2</span>
</div>
<!-- Professional Toggle -->
<div class="flex items-center gap-2 border-l border-outline-variant/20 pl-4">
<span class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant">Mirror</span>
<button class="w-10 h-5 bg-primary rounded-full relative p-0.5 transition-all">
<div class="w-4 h-4 bg-surface-bright rounded-full shadow-sm absolute right-0.5 top-0.5"></div>
</button>
</div>
</div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-2xl z-50 pb-safe bg-neutral-900/80 backdrop-blur-2xl border-t border-neutral-800/50 shadow-[0_-10px_40px_rgba(0,0,0,0.8)]">
<div class="flex justify-around items-center w-full px-4 h-20">
<a class="flex flex-col items-center justify-center text-neutral-500 pt-2 hover:text-neutral-200 transition-all active:opacity-80 scale-98" href="#">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-manrope text-[10px] font-medium tracking-tighter uppercase mt-1">Scripts</span>
</a>
<a class="flex flex-col items-center justify-center text-red-400 border-t-2 border-red-500 pt-2 transition-all active:opacity-80 scale-98" href="#">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
<span class="font-manrope text-[10px] font-medium tracking-tighter uppercase mt-1">Editor</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 pt-2 hover:text-neutral-200 transition-all active:opacity-80 scale-98" href="#">
<span class="material-symbols-outlined" data-icon="movie">movie</span>
<span class="font-manrope text-[10px] font-medium tracking-tighter uppercase mt-1">Gallery</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 pt-2 hover:text-neutral-200 transition-all active:opacity-80 scale-98" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-manrope text-[10px] font-medium tracking-tighter uppercase mt-1">Settings</span>
</a>
</div>
</nav>
<!-- Floating Record Action (SUPPRESSED per context: Editor mode) -->
<!-- The FAB is suppressed as it's an editor screen focusing on text input -->
</body></html>
